model:
  vocab_size: 10000
  context_length: 256
  d_model: 512
  num_layers: 4
  num_heads: 16
  d_ff: 1344
  rope_theta: 10000.0

training:
  device: "auto"
  batch_size: 64
  max_steps: 5000
  val_interval: 500
  gpu_log_interval: 100
  checkpoint_dir: "checkpoints/sample"
  wandb: true
  wandb_project: "sample"

optimizer:
  learning_rate_max: 6.0e-4
  learning_rate_min: 6.0e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 200
  decay_steps: 5000

dataset:
  train_path: "data/train.bin"
  val_path: "data/val.bin"
